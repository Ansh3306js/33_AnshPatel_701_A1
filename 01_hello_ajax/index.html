<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAX Fetch Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #38bdf8;
        }
        button {
            background: linear-gradient(90deg, #0284c7, #0369a1);
            color: #ffffff;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background: linear-gradient(90deg, #0369a1, #075985);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #38bdf8;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AJAX Fetch Request</h1>
        <p>Click the button below to fetch a message from the server.</p>
        <button id="fetchBtn">Fetch Greeting</button>
        <div class="result-box" id="result">Click the button to request data...</div>
    </div>

    <script>
        document.getElementById('fetchBtn').addEventListener('click', () => {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Fetching data...';

            fetch('/gethello')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    resultDiv.textContent = data;
                })
                .catch(error => {
                    resultDiv.textContent = 'Error: ' + error.message;
                    console.error('Fetch error:', error);
                });
        });
    </script>
</body>
</html>
